---
name: Scheduled Release

"on":
  schedule:
    - cron: '0 0 */14 * *'  # Every 2 weeks
  workflow_dispatch:  # Allow manual triggering

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version and check for commits
        id: versioning
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe \
            --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Check for new commits since the latest tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS_SINCE=$(git rev-list HEAD --count)
          else
            COMMITS_SINCE=$(git rev-list \
              $LATEST_TAG..HEAD --count 2>/dev/null || echo "0")
          fi

          echo "Commits since last tag: $COMMITS_SINCE"

          if [ "$COMMITS_SINCE" -eq 0 ]; then
            echo "No new commits since the last tag. Skipping release."
            echo "skip_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate the new version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "skip_release=false" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        if: steps.versioning.outputs.skip_release != 'true'
        run: |
          LATEST_TAG=${{ steps.versioning.outputs.latest_tag }}
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            git log HEAD --oneline > changelog.txt
          else
            git log $LATEST_TAG..HEAD --oneline > changelog.txt
          fi
          echo "Changelog generated:"
          cat changelog.txt

      - name: Create Git Tag and GitHub Release
        if: steps.versioning.outputs.skip_release != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG=${{ steps.versioning.outputs.new_tag }}

          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and push the tag
          git tag $NEW_TAG
          git push origin $NEW_TAG

          # Create the release
          gh release create $NEW_TAG \
            --title "Release $NEW_TAG" \
            --notes-file changelog.txt

name: Issue and PR Bot

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  issue-and-pr-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Handle Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = context.payload.issue.body || '';

            const msg = 'Thanks for opening an issue! ' +
              'We will review it and get back to you ' +
              'as soon as possible.';

            await github.rest.issues.createComment({
              owner, repo, issue_number, body: msg
            });

            await github.rest.issues.addAssignees({
              owner, repo, issue_number, assignees: [owner]
            });

            const labels = [];
            if (body.includes('<!-- template: bug -->')) {
              labels.push('bug');
            }
            if (body.includes('<!-- template: enhancement -->')) {
              labels.push('enhancement');
            }
            if (body.includes('<!-- template: question -->')) {
              labels.push('question');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels
              });
            }

      - name: Handle PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const pr = context.payload.pull_request;
            const assoc = pr.author_association;

            if (assoc === 'FIRST_TIMER' ||
                assoc === 'FIRST_TIME_CONTRIBUTOR') {
              const msg = 'Welcome and thanks for your first PR! ' +
                'A reviewer will review your code soon. ' +
                'We appreciate your contribution!';
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: msg
              });
            }
